<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tokscr result</title>
    <link rel="stylesheet" href="result.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="mark">t</span>
        <div>
          <p class="eyebrow">capture result</p>
          <h1>tokscr</h1>
        </div>
      </div>
      <nav class="actions" aria-label="输出操作">
        <button type="button" data-action="edit">编辑</button>
        <button type="button" data-action="crop">裁剪</button>
        <button type="button" data-action="png">PNG</button>
        <button type="button" data-action="jpeg">JPEG</button>
        <button type="button" data-action="pdf">PDF</button>
        <button type="button" data-action="copy">复制</button>
        <button type="button" data-action="print">打印</button>
      </nav>
    </header>

    <main class="layout">
      <aside class="meta-panel">
        <p class="label">来源</p>
        <h2 id="captureTitle">读取截图中...</h2>
        <p id="captureUrl" class="source-url"></p>
        <dl class="meta-list">
          <div>
            <dt>模式</dt>
            <dd id="captureMode">-</dd>
          </div>
          <div>
            <dt>尺寸</dt>
            <dd id="captureSize">-</dd>
          </div>
          <div>
            <dt>时间</dt>
            <dd id="captureTime">-</dd>
          </div>
        </dl>
        <p id="statusText" class="status">准备就绪</p>
      </aside>

      <section class="preview-shell" aria-label="截图预览">
        <div id="editorToolbar" class="editor-toolbar" hidden>
          <div class="editor-group" aria-label="编辑工具">
            <button type="button" data-editor-tool="select">选择</button>
            <button type="button" data-editor-tool="crop">裁剪</button>
            <button type="button" data-editor-tool="text">文字</button>
            <button type="button" data-editor-tool="arrow">箭头</button>
            <button type="button" data-editor-tool="rect">矩形</button>
            <button type="button" data-editor-tool="brush">画笔</button>
            <button type="button" data-editor-tool="mosaic">马赛克</button>
            <button type="button" data-editor-tool="cover">遮盖</button>
          </div>
          <div class="editor-group editor-swatches" aria-label="颜色">
            <button type="button" data-editor-color="#d93025" style="--swatch: #d93025" title="红色"></button>
            <button type="button" data-editor-color="#fbbc04" style="--swatch: #fbbc04" title="黄色"></button>
            <button type="button" data-editor-color="#1a73e8" style="--swatch: #1a73e8" title="蓝色"></button>
            <button type="button" data-editor-color="#188038" style="--swatch: #188038" title="绿色"></button>
            <button type="button" data-editor-color="#202124" style="--swatch: #202124" title="黑色"></button>
            <button type="button" data-editor-color="#ffffff" style="--swatch: #ffffff" title="白色"></button>
          </div>
          <div class="editor-group" aria-label="线宽">
            <button type="button" data-editor-width="3">细</button>
            <button type="button" data-editor-width="6">中</button>
            <button type="button" data-editor-width="12">粗</button>
          </div>
          <div class="editor-group" aria-label="字号">
            <button type="button" data-editor-size="22">小字</button>
            <button type="button" data-editor-size="32">中字</button>
            <button type="button" data-editor-size="48">大字</button>
          </div>
          <div class="editor-group editor-commands" aria-label="编辑操作">
            <button type="button" id="editorUndo">撤销</button>
            <button type="button" id="editorRedo">重做</button>
            <button type="button" id="editorDelete">删除</button>
            <button type="button" id="editorCancel">取消</button>
            <button type="button" id="editorApply">应用编辑</button>
          </div>
        </div>
        <div id="cropToolbar" class="crop-toolbar" hidden>
          <span>拖动裁剪框调整范围</span>
          <button type="button" id="cropApply">应用裁剪</button>
          <button type="button" id="cropCancel">取消</button>
        </div>
        <div id="previewFrame" class="preview-frame">
          <img id="previewImage" alt="截图预览">
          <canvas id="editorCanvas" class="editor-canvas" hidden></canvas>
          <input id="inlineTextEditor" class="inline-text-editor" type="text" autocomplete="off" spellcheck="false" hidden>
          <div id="cropOverlay" class="crop-overlay" hidden>
            <div id="cropBox" class="crop-box" role="group" aria-label="裁剪区域">
              <span class="crop-handle crop-handle-nw" data-handle="nw"></span>
              <span class="crop-handle crop-handle-ne" data-handle="ne"></span>
              <span class="crop-handle crop-handle-se" data-handle="se"></span>
              <span class="crop-handle crop-handle-sw" data-handle="sw"></span>
              <span class="crop-handle crop-handle-n" data-handle="n"></span>
              <span class="crop-handle crop-handle-e" data-handle="e"></span>
              <span class="crop-handle crop-handle-s" data-handle="s"></span>
              <span class="crop-handle crop-handle-w" data-handle="w"></span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="capture-store.js"></script>
    <script src="crop-utils.js"></script>
    <script src="editor-utils.js"></script>
    <script src="result.js"></script>
  </body>
</html>
